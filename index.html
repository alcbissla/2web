<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Auto Link Rotator</title>

<script>
let links = [
"https://omg10.com/4/10735844",
"https://link.gigapub.tech/l/5wuv50bo3",
];

let delay = 6000; // 6 seconds
let index = 0;

function openLinksLoop() {

    setInterval(() => {

        window.open(links[index], "_blank");

        index++;
        if(index >= links.length){
            index = 0;
        }

    }, delay);

}
</script>

<style>
body{
font-family: Arial;
text-align:center;
padding-top:100px;
background:#111;
color:white;
}

button{
padding:15px 40px;
font-size:20px;
border:none;
border-radius:10px;
cursor:pointer;
background:#00c853;
color:white;
}
</style>

</head>

<body>

<h2>Start Auto Link Rotator</h2>
<p>Click once to start automatic opening</p>

<button onclick="openLinksLoop()">START</button>

</body>
</html>
