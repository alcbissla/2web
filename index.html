<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Auto Rotator</title>

<script>
let links = [
 "https://omg10.com/4/10735844",
 "https://link.gigapub.tech/l/5wuv50bo3"
];

let index = 0;

function rotate() {
    document.getElementById("frame").src = links[index];
    index = (index + 1) % links.length;
}

window.onload = function () {
    rotate(); // open immediately
    setInterval(rotate, 6000); // change every 6 seconds
};
</script>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
}
iframe{
width:100%;
height:100%;
border:none;
}
</style>

</head>

<body>

<iframe id="frame"></iframe>

</body>
</html>
